<html>

<body>
    <h1> Add Two Number </h1>

    <script>
        function add(a, b) {
            return a + b;
        }

        let num1 = Number(prompt("Enter first number: "));
        let num2 = Number(prompt("Enter second number: "));

        document.write("Sum: " + add(num1, num2));
    </script>

</body>

</html>
