<!DOCTYPE html>
<html>
<head>
  <title>For Loop Output</title>
  <style>

    .box {
      border: 1px solid #ccc;
      padding: 20px;
      width: 300px;
      text-align: center;
      font-family: sans-serif;
    }
    .output {
      color: blue;
    }
  </style>
</head>
<body>

  <div class="box">
    <h2>For Loop Output</h2>
    <button onclick="runLoop()">Run Loop</button>
    <h1 id="result" class="output"></h1>
  </div>

  <script>

    function runLoop() {
      let output = "";
      
      for (let i = 1; i <= 10; i++) {
        output += "The Value is: " + i + "<br>"; 
      }
         document.getElementById("result").innerHTML = output;
    }
  </script>

</body>
</html>
