<!DOCTYPE html>
<html>
<head>
 <style>
 .card {
 width: 200px;
 border: 1px solid #ccc;
 padding: 15px;
 text-align: center;
 box-shadow: 2px 2px 10px gray;
 }
 button {
 background: blue;
 color: white;
 padding: 10px;
 border: none;
 }
 button:hover {
 background: darkblue;
 }
 </style>
</head>
<body>
<div class="card">
 <img src="https://via.placeholder.com/150" width="100%">
 <h3>Product Name</h3>
 <p>$10.00</p>
 <button>Buy Now</button>
</div>
</body>
</html>
