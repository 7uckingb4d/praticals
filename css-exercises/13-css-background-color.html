<!DOCTYPE html>
<html>
<head>
 <title>CSS Background Color</title>
 <style>
 body {
 background-color: #f0f8ff;
 }
 .box1 {
 background-color: red;
 padding: 20px;
 margin: 10px;
 color: white;
 }
 .box2 {
 background-color: #00FF00;
 padding: 20px;
 margin: 10px;
 }
 .box3 {
 background-color: rgb(0, 0, 255);
 padding: 20px;
 margin: 10px;
 color: white;
 }
 .box4 {
 background-color: rgba(255, 165, 0, 0.5);
 padding: 20px;
 margin: 10px;
 }
 </style>
</head>
<body>
 <h1>CSS Background Color Examples</h1>
 <div class="box1">Box with Red Background (Named Color)</div>
 <div class="box2">Box with Green Background (Hex Code)</div>
 <div class="box3">Box with Blue Background (RGB)</div>
 <div class="box4">Box with Orange Background (RGBA with Opacity)</div>
</body>
</html>
