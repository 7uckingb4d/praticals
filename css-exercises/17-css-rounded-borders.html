<!DOCTYPE html>
<html>
<head>
 <title>CSS Rounded Borders</title>
 <style>
 body {
 background-color: #f0f8ff;
 font-family: Arial;
 }
 .radius-10 {
 border: 2px solid #333;
 border-radius: 10px;
 padding: 15px;
 margin: 10px;
 }
 .radius-20 {
 border: 2px solid #333;
 border-radius: 20px;
 padding: 15px;
 margin: 10px;
 }
 .radius-50 {
 border: 2px solid #333;
 border-radius: 50%;
 width: 200px;
 height: 200px;
 padding: 15px;
 margin: 10px;
 display: flex;
 align-items: center;
 justify-content: center;
 }
 .individual-radius {
 border: 2px solid #333;
 border-radius: 50px 10px 50px 10px;
 padding: 15px;
 margin: 10px;
 }
 </style>
</head>
<body>
 <h1>CSS Rounded Borders</h1>
 <div class="radius-10">Border Radius: 10px</div>
 <div class="radius-20">Border Radius: 20px</div>
 <div class="radius-50">Border Radius: 50% (Circle)</div>
 <div class="individual-radius">Individual Corner Radius</div>
</body>
</html>
