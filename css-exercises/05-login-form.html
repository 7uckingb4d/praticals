<!DOCTYPE html>
<html>
<head>
 <style>
 body {
 display: flex;
 justify-content: center;
 align-items: center;
 height: 100vh;
 font-family: Arial;
 }
 .login {
 border: 1px solid #ccc;
 padding: 20px;
 width: 250px;
 }
 input {
 width: 100%;
 margin: 10px 0;
 padding: 8px;
 border-radius: 5px;
 }
 button {
 width: 100%;
 padding: 10px;
 background: green;
 color: white;
 border: none;
 }
 </style>
</head>
<body>
<div class="login">
 <h3>Login</h3>
 <input type="email" placeholder="Email">
 <input type="password" placeholder="Password">
 <button>Login</button>
</div>
</body>
</html>
