<!DOCTYPE html>
<html>
<head>
 <title>CSS Margins</title>
 <style>
 body {
 background-color: #f0f8ff;
 font-family: Arial;
 }
 .margin-20 {
 background-color: lightgreen;
 margin: 20px;
 padding: 15px;
 }
 .margin-auto {
 background-color: lightblue;
 margin: auto;
 width: 300px;
 padding: 15px;
 text-align: center;
 }
 .margin-top-50 {
 background-color: lightyellow;
 margin-top: 50px;
 padding: 15px;
 }
 .margin-different {
 background-color: lightcoral;
 margin: 10px 20px 30px 40px;
 padding: 15px;
 }
 </style>
</head>
<body>
 <h1>CSS Margin Examples</h1>
 <div class="margin-20">Margin: 20px (All sides)</div>
 <div class="margin-auto">Margin: Auto (Centered)</div>
 <div class="margin-top-50">Margin-Top: 50px</div>
 <div class="margin-different">Margin: 10px 20px 30px 40px (Top Right Bottom Left)</div>
</body>
</html>
