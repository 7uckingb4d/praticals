<!DOCTYPE html>
<html>
<head>
 <title>CSS Background Opacity</title>
 <style>
 body {
 background-color: #f0f8ff;
 }
 .container {
 position: relative;
 width: 300px;
 height: 200px;
 margin: 20px;
 }
 .opacity-full {
 background-color: rgba(255, 0, 0, 1);
 padding: 20px;
 margin: 10px;
 color: white;
 }
 .opacity-75 {
 background-color: rgba(0, 255, 0, 0.75);
 padding: 20px;
 margin: 10px;
 }
 .opacity-50 {
 background-color: rgba(0, 0, 255, 0.5);
 padding: 20px;
 margin: 10px;
 color: white;
 }
 .opacity-25 {
 background-color: rgba(255, 165, 0, 0.25);
 padding: 20px;
 margin: 10px;
 }
 </style>
</head>
<body>
 <h1>CSS Background Opacity Examples</h1>
 <div class="opacity-full">Opacity 1 (Full - No Transparency)</div>
 <div class="opacity-75">Opacity 0.75 (75% Opaque)</div>
 <div class="opacity-50">Opacity 0.5 (50% Transparent)</div>
 <div class="opacity-25">Opacity 0.25 (75% Transparent)</div>
</body>
</html>
