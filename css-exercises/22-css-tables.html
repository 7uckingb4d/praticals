<!DOCTYPE html>
<html>
<head>
 <title>CSS Tables</title>
 <style>
 body {
 background-color: #f0f8ff;
 font-family: Arial;
 }
 table {
 border-collapse: collapse;
 width: 100%;
 margin: 20px 0;
 }
 th {
 background-color: #333;
 color: white;
 padding: 12px;
 text-align: left;
 border: 1px solid #ddd;
 }
 td {
 padding: 12px;
 border: 1px solid #ddd;
 }
 tr:nth-child(even) {
 background-color: #f2f2f2;
 }
 tr:hover {
 background-color: #e6e6e6;
 }
 </style>
</head>
<body>
 <h1>CSS Table Styling</h1>
 <table>
  <tr>
   <th>Name</th>
   <th>Age</th>
   <th>City</th>
  </tr>
  <tr>
   <td>John</td>
   <td>25</td>
   <td>New York</td>
  </tr>
  <tr>
   <td>Jane</td>
   <td>30</td>
   <td>Los Angeles</td>
  </tr>
  <tr>
   <td>Bob</td>
   <td>35</td>
   <td>Chicago</td>
  </tr>
  <tr>
   <td>Alice</td>
   <td>28</td>
   <td>Houston</td>
  </tr>
 </table>
</body>
</html>
