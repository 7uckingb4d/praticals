<!DOCTYPE html>
<html>
<head>
 <title>CSS Paddings</title>
 <style>
 body {
 background-color: #f0f8ff;
 font-family: Arial;
 }
 .padding-10 {
 background-color: lightgreen;
 border: 2px solid green;
 padding: 10px;
 margin: 10px;
 }
 .padding-20 {
 background-color: lightblue;
 border: 2px solid blue;
 padding: 20px;
 margin: 10px;
 }
 .padding-30 {
 background-color: lightyellow;
 border: 2px solid orange;
 padding: 30px;
 margin: 10px;
 }
 .padding-different {
 background-color: lightcoral;
 border: 2px solid red;
 padding: 5px 15px 25px 35px;
 margin: 10px;
 }
 </style>
</head>
<body>
 <h1>CSS Padding Examples</h1>
 <div class="padding-10">Padding: 10px</div>
 <div class="padding-20">Padding: 20px</div>
 <div class="padding-30">Padding: 30px</div>
 <div class="padding-different">Padding: 5px 15px 25px 35px (Top Right Bottom Left)</div>
</body>
</html>
