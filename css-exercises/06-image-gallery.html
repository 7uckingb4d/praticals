<!DOCTYPE html>
<html>
<head>
 <style>
 .gallery {
 display: grid;
 grid-template-columns: repeat(3, 1fr);
 gap: 10px;
 }
 img {
 width: 100%;
 transition: transform 0.3s;
 }
 img:hover {
 transform: scale(1.1);
 }
 @media (max-width: 768px) {
 .gallery {
 grid-template-columns: 1fr;
 }
 }
 </style>
</head>
<body>
<div class="gallery">
 <img src="https://via.placeholder.com/200">
 <img src="https://via.placeholder.com/200">
 <img src="https://via.placeholder.com/200">
 <img src="https://via.placeholder.com/200">
 <img src="https://via.placeholder.com/200">
 <img src="https://via.placeholder.com/200">
</div>
</body>
</html>
