<!DOCTYPE html>
<html>
<head>
 <title>CSS Borders</title>
 <style>
 body {
 background-color: #f0f8ff;
 font-family: Arial;
 }
 .solid {
 border: 3px solid red;
 padding: 15px;
 margin: 10px;
 }
 .dashed {
 border: 3px dashed blue;
 padding: 15px;
 margin: 10px;
 }
 .dotted {
 border: 3px dotted green;
 padding: 15px;
 margin: 10px;
 }
 .double {
 border: 5px double purple;
 padding: 15px;
 margin: 10px;
 }
 .groove {
 border: 5px groove orange;
 padding: 15px;
 margin: 10px;
 }
 .inset {
 border: 5px inset brown;
 padding: 15px;
 margin: 10px;
 }
 </style>
</head>
<body>
 <h1>CSS Border Styles</h1>
 <div class="solid">Solid Border</div>
 <div class="dashed">Dashed Border</div>
 <div class="dotted">Dotted Border</div>
 <div class="double">Double Border</div>
 <div class="groove">Groove Border</div>
 <div class="inset">Inset Border</div>
</body>
</html>
