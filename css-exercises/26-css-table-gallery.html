<!DOCTYPE html>
<html>
<head>
 <title>Table Gallery</title>
 <style>
 body {
 background-color: #f0f8ff;
 font-family: Arial, sans-serif;
 }
 table {
 border-collapse: collapse;
 width: 100%;
 }
 td {
 border: 2px solid #333;
 padding: 10px;
 text-align: center;
 background-color: white;
 }
 td:hover {
 background-color: #e6e6e6;
 transform: scale(1.05);
 }
 td img {
 width: 100%;
 height: auto;
 display: block;
 }
 </style>
</head>
<body>
 <h1>Table Gallery Using CSS</h1>
 <table>
  <tr>
   <td>
    <img src="https://via.placeholder.com/200" alt="Image 1">
    <p>Image 1</p>
   </td>
   <td>
    <img src="https://via.placeholder.com/200" alt="Image 2">
    <p>Image 2</p>
   </td>
   <td>
    <img src="https://via.placeholder.com/200" alt="Image 3">
    <p>Image 3</p>
   </td>
  </tr>
  <tr>
   <td>
    <img src="https://via.placeholder.com/200" alt="Image 4">
    <p>Image 4</p>
   </td>
   <td>
    <img src="https://via.placeholder.com/200" alt="Image 5">
    <p>Image 5</p>
   </td>
   <td>
    <img src="https://via.placeholder.com/200" alt="Image 6">
    <p>Image 6</p>
   </td>
  </tr>
  <tr>
   <td>
    <img src="https://via.placeholder.com/200" alt="Image 7">
    <p>Image 7</p>
   </td>
   <td>
    <img src="https://via.placeholder.com/200" alt="Image 8">
    <p>Image 8</p>
   </td>
   <td>
    <img src="https://via.placeholder.com/200" alt="Image 9">
    <p>Image 9</p>
   </td>
  </tr>
 </table>
</body>
</html>
